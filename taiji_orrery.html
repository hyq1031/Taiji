<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="description" content="An interactive orrery inspired by Taoist cosmology, visualizing the eight trigrams (八卦) and their elemental cycles.">
<title>太極 Cosmos — Interactive Orrery</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    background: #050812;
    color: #f5f0e8;
    font-family: Georgia, 'Times New Roman', serif;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    user-select: none;
}

#canvas { display: block; position: absolute; top: 0; left: 0; cursor: crosshair; }

/* ── Title ── */
#title {
    position: absolute;
    top: 24px; left: 32px;
    pointer-events: none;
    z-index: 10;
}
#title h1 {
    font-size: 22px;
    font-weight: normal;
    color: #c9a227;
    letter-spacing: 3px;
    text-shadow: 0 0 20px rgba(201,162,39,0.4);
}
#title p {
    font-size: 10px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: rgba(201,162,39,0.45);
    margin-top: 5px;
}

/* ── Controls ── */
#controls {
    position: absolute;
    bottom: calc(28px + env(safe-area-inset-bottom, 0px));
    left: 50%;
    transform: translateX(-50%) translateY(0);
    display: flex;
    gap: 8px;
    align-items: center;
    z-index: 10;
    flex-wrap: wrap;
    justify-content: center;
    max-width: min(92vw, 760px);
    padding: 11px 16px;
    background: rgba(10,14,28,0.5);
    backdrop-filter: blur(18px) saturate(160%);
    -webkit-backdrop-filter: blur(18px) saturate(160%);
    border: 1px solid rgba(201,162,39,0.18);
    border-radius: 22px;
    box-shadow: 0 18px 44px rgba(0,0,0,0.55), inset 0 1px 0 rgba(255,255,255,0.05);
    transition: transform 0.34s cubic-bezier(.4,0,.2,1), opacity 0.34s ease;
}
#controls.hidden {
    transform: translateX(-50%) translateY(160%);
    opacity: 0;
    pointer-events: none;
}

/* Pill handle to bring the bar back when minimized */
#controls-handle {
    position: absolute;
    bottom: calc(14px + env(safe-area-inset-bottom, 0px));
    left: 50%;
    transform: translateX(-50%);
    z-index: 11;
    background: rgba(10,14,28,0.6);
    backdrop-filter: blur(12px) saturate(160%);
    -webkit-backdrop-filter: blur(12px) saturate(160%);
    border: 1px solid rgba(201,162,39,0.28);
    color: rgba(201,162,39,0.75);
    padding: 7px 22px;
    border-radius: 22px;
    font-size: 13px;
    letter-spacing: 3px;
    cursor: pointer;
    font-family: Georgia, serif;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease, border-color 0.18s, color 0.18s;
}
#controls-handle.show { opacity: 1; pointer-events: auto; }
#controls-handle:hover { border-color: rgba(201,162,39,0.7); color: #c9a227; }
#btn-min { font-size: 15px; line-height: 1; padding: 6px 12px; }
.ctrl-btn {
    background: rgba(201,162,39,0.07);
    border: 1px solid rgba(201,162,39,0.2);
    border-radius: 999px;
    color: rgba(201,162,39,0.8);
    padding: 7px 16px;
    font-size: 12px;
    letter-spacing: 1.3px;
    cursor: pointer;
    font-family: Georgia, serif;
    transition: all 0.18s;
    white-space: nowrap;
}
.ctrl-btn:hover, .ctrl-btn.active {
    background: rgba(201,162,39,0.24);
    border-color: rgba(201,162,39,0.75);
    color: #f5d98a;
}
#speed-display {
    color: rgba(201,162,39,0.55);
    font-size: 11px;
    letter-spacing: 2.5px;
    min-width: 80px;
    text-align: center;
}

/* ── Info panel ── */
#info {
    position: absolute;
    top: 50%;
    right: 28px;
    transform: translateY(-50%);
    width: 290px;
    background: rgba(5,8,18,0.94);
    border: 1px solid rgba(201,162,39,0.22);
    padding: 30px 28px 26px;
    z-index: 10;
    display: none;
    backdrop-filter: blur(6px);
}
#info.show { display: block; }
#info-x {
    position: absolute; top: 14px; right: 18px;
    background: none; border: none;
    color: rgba(201,162,39,0.4); cursor: pointer;
    font-size: 16px; line-height: 1;
}
#info-x:hover { color: #c9a227; }
#i-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
#i-name { font-size: 21px; }
#i-chinese { font-size: 38px; line-height: 1; }
#i-sub {
    font-size: 10px; letter-spacing: 3px; text-transform: uppercase;
    color: rgba(245,240,232,0.45); margin-bottom: 20px;
}
#i-hr { height: 1px; background: linear-gradient(to right, transparent, rgba(201,162,39,0.35), transparent); margin: 0 0 18px; }
.i-row { display: flex; gap: 10px; margin-bottom: 10px; }
.i-lbl { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: rgba(201,162,39,0.55); min-width: 66px; padding-top: 3px; }
.i-val { font-size: 13px; color: rgba(245,240,232,0.82); line-height: 1.5; }
#i-quote {
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid rgba(255,255,255,0.05);
    font-style: italic;
    font-size: 13px;
    line-height: 1.75;
    color: rgba(245,240,232,0.55);
}

/* ── Legend ── */
#legend {
    position: absolute; bottom: 80px; left: 32px;
    z-index: 10; pointer-events: none;
}
.leg { display: flex; align-items: center; gap: 10px; margin-bottom: 9px; font-size: 11px; color: rgba(245,240,232,0.4); letter-spacing: 1px; }
.leg-line { width: 34px; height: 0; }

/* ── Now indicator ── */
#now-badge {
    position: absolute;
    top: 24px; right: 28px;
    z-index: 10;
    pointer-events: none;
    text-align: right;
    display: none;
}
#now-badge.show { display: block; }
#now-element { font-size: 28px; letter-spacing: 2px; }
#now-label { font-size: 9px; letter-spacing: 3px; text-transform: uppercase; color: rgba(201,162,39,0.45); margin-top: 3px; }
#now-mode { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: rgba(201,162,39,0.3); margin-top: 2px; }

/* ── Hover tooltip ── */
#tooltip {
    position: absolute;
    pointer-events: none;
    background: rgba(5,8,18,0.9);
    border: 1px solid rgba(201,162,39,0.3);
    padding: 6px 12px;
    font-size: 12px;
    letter-spacing: 1px;
    color: rgba(245,240,232,0.8);
    z-index: 20;
    display: none;
    white-space: nowrap;
}

/* ── Responsive ── */
@media (max-width: 600px) {
    #title { top: 16px; left: 18px; }
    #title h1 { font-size: 17px; letter-spacing: 2px; }
    #title p { font-size: 8px; letter-spacing: 2px; }

    #now-badge { top: 16px; right: 18px; }
    #now-element { font-size: 20px; }

    /* Info panel becomes a bottom sheet */
    #info {
        top: auto; bottom: 0; right: 0; left: 0;
        transform: none;
        width: auto;
        max-height: 58vh;
        overflow-y: auto;
        padding: 22px 20px calc(24px + env(safe-area-inset-bottom, 0px));
        border: none;
        border-top: 1px solid rgba(201,162,39,0.3);
    }
    #i-chinese { font-size: 30px; }
    #i-name { font-size: 18px; }

    /* Legend would collide with the controls — hide it */
    #legend { display: none; }

    #controls {
        bottom: 16px;
        gap: 6px;
        max-width: 95vw;
        padding: 9px 12px;
        border-radius: 18px;
    }
    .ctrl-btn { padding: 6px 11px; font-size: 10.5px; letter-spacing: 1px; }
    #speed-display { font-size: 10px; letter-spacing: 1.5px; min-width: 64px; }
}

@media (prefers-reduced-motion: reduce) {
    .ctrl-btn { transition: none; }
}
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div id="title">
    <h1>太極 COSMOS</h1>
    <p>A Living Orrery of Yin, Yang &amp; Qi</p>
</div>

<div id="now-badge">
    <div id="now-element"></div>
    <div id="now-label">Active Element</div>
    <div id="now-mode"></div>
</div>

<div id="info">
    <button id="info-x">✕</button>
    <div id="i-header">
        <div id="i-name"></div>
        <div id="i-chinese"></div>
    </div>
    <div id="i-sub"></div>
    <div id="i-hr"></div>
    <div class="i-row"><span class="i-lbl" id="lbl-planet">Planet</span><span class="i-val" id="iv-planet"></span></div>
    <div class="i-row"><span class="i-lbl" id="lbl-organs">Organs</span><span class="i-val" id="iv-organs"></span></div>
    <div class="i-row"><span class="i-lbl" id="lbl-energy">Energy</span><span class="i-val" id="iv-energy"></span></div>
    <div class="i-row"><span class="i-lbl" id="lbl-gen">Generates</span><span class="i-val" id="iv-gen"></span></div>
    <div class="i-row"><span class="i-lbl" id="lbl-ctrl">Controls</span><span class="i-val" id="iv-ctrl"></span></div>
    <div id="i-quote"></div>
</div>

<div id="legend">
    <div class="leg"><svg width="34" height="12"><line x1="0" y1="6" x2="34" y2="6" stroke="rgba(100,210,120,0.5)" stroke-width="1.5"/><circle cx="10" cy="6" r="2.5" fill="rgba(100,210,120,0.7)"/><circle cx="24" cy="6" r="2.5" fill="rgba(100,210,120,0.7)"/></svg><span id="leg-gen-text">Generating 相生</span></div>
    <div class="leg"><svg width="34" height="12"><line x1="0" y1="6" x2="34" y2="6" stroke="rgba(210,80,80,0.5)" stroke-width="1.5"/><circle cx="10" cy="6" r="2" fill="rgba(210,80,80,0.7)"/><circle cx="24" cy="6" r="2" fill="rgba(210,80,80,0.7)"/></svg><span id="leg-ctrl-text">Controlling 相克</span></div>
</div>

<div id="controls">
    <button class="ctrl-btn" id="btn-slow">−</button>
    <span id="speed-display">1× SPEED</span>
    <button class="ctrl-btn" id="btn-fast">+</button>
    <button class="ctrl-btn" id="btn-pause">⏸ PAUSE</button>
    <button class="ctrl-btn active" id="btn-cycles">CYCLES</button>
    <button class="ctrl-btn active" id="btn-qi">QI 氣</button>
    <button class="ctrl-btn active" id="btn-labels">LABELS</button>
    <button class="ctrl-btn active" id="btn-bagua">八卦</button>
    <button class="ctrl-btn" id="btn-sound">♪ SOUND</button>
    <button class="ctrl-btn" id="btn-now">NOW</button>
    <button class="ctrl-btn" id="btn-lang" title="Switch language" aria-label="Switch language">🌐 EN/中</button>
    <button class="ctrl-btn" id="btn-min" title="Hide controls" aria-label="Hide controls">⌄</button>
</div>

<button id="controls-handle" aria-label="Show controls">☰ 控制</button>

<div id="tooltip"></div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let W = 0, H = 0, DPR = 1;
function resize() {
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = Math.round(W * DPR);
    canvas.height = Math.round(H * DPR);
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
const COARSE = window.matchMedia('(pointer:coarse)').matches;
resize();
window.addEventListener('resize', resize);

// ── State ──
let t = 0, speed = 1, paused = false;
let showCycles = true, showQi = true, showLabels = true, showBagua = true;
let soundOn = false, nowMode = 0; // nowMode: 0=off, 1=season, 2=time
let selected = null, hovered = null;
let prevHovered = null;

// ── i18n (control bar + chrome labels) ──
const I18N = {
    speed:       { en:'SPEED',         zh:'速度' },
    pause:       { en:'PAUSE',         zh:'暫停' },
    resume:      { en:'RESUME',        zh:'繼續' },
    cycles:      { en:'CYCLES',        zh:'循環' },
    qi:          { en:'QI',            zh:'氣' },
    labels:      { en:'LABELS',        zh:'標籤' },
    bagua:       { en:'BAGUA',         zh:'八卦' },
    sound:       { en:'SOUND',         zh:'音效' },
    now:         { en:'NOW',           zh:'現在' },
    season:      { en:'SEASON',        zh:'季節' },
    clock:       { en:'CLOCK',         zh:'時鐘' },
    menu:        { en:'MENU',          zh:'控制' },
    hide:        { en:'Hide controls', zh:'隱藏控制' },
    show:        { en:'Show controls', zh:'顯示控制' },
    activeEl:    { en:'Active Element', zh:'當前元素' },
    organClock:  { en:'ORGAN CLOCK',   zh:'臟腑時鐘' },
    generating:  { en:'Generating',    zh:'相生' },
    controlling: { en:'Controlling',   zh:'相克' },
    lblPlanet:   { en:'Planet',        zh:'行星' },
    lblOrgans:   { en:'Organs',        zh:'臟腑' },
    lblEnergy:   { en:'Energy',        zh:'能量' },
    lblGenerates:{ en:'Generates',     zh:'生' },
    lblControls: { en:'Controls',      zh:'克' },
};
const ELEMENT_ZH = { Wood:'木', Fire:'火', Earth:'土', Metal:'金', Water:'水' };
let lang = 'both'; // 'en' | 'zh' | 'both'
try {
    const savedLang = localStorage.getItem('taiji-lang');
    if (savedLang) lang = savedLang;
} catch (e) {}

function tr(key) {
    const d = I18N[key];
    if (lang === 'en') return d.en;
    if (lang === 'zh') return d.zh;
    return `${d.en} ${d.zh}`;
}

// Per-planet bilingual field (e.g. p.organs / p.organsZh)
function pf(p, key) {
    const en = p[key], zh = p[key + 'Zh'];
    if (lang === 'en') return en;
    if (lang === 'zh') return zh;
    return `${en} / ${zh}`;
}

// Element name (e.g. p.gen === 'Earth') in the current language
function elLabel(elName) {
    const zh = ELEMENT_ZH[elName];
    if (lang === 'en') return elName;
    if (lang === 'zh') return zh;
    return `${elName} ${zh}`;
}

// ── Stars ──
const STARS = Array.from({length: 320}, () => ({
    x: Math.random(), y: Math.random(),
    r: Math.random() * 1.5 + 0.2,
    a: Math.random() * 0.55 + 0.15,
    ts: Math.random() * 2.5 + 0.4,
    to: Math.random() * Math.PI * 2,
    gold: Math.random() < 0.08,
}));

// ── Planets ──
const PLANETS = [
    {
        id:'fire', name:'Fire', cn:'火', py:'Huǒ',
        color:'#e53935', glow:'229,57,53',
        season:'Summer', seasonZh:'夏', ordinal:'2nd Planet', ordinalZh:'第二行星',
        r:0.115, spd:0.60, tilt:0.06, a0:1.0, sz:10,
        organs:'Heart · Small Intestine', organsZh:'心 · 小腸',
        energy:'Outward in all directions simultaneously', energyZh:'同時向四方擴散',
        gen:'Earth', ctrl:'Metal',
        freq: 392.00,
        quote:'Joy expressed so fully it becomes light itself — the heart that feels, that connects.',
        quoteZh:'喜悅盈滿,化為光本身——感受萬物、連結萬物的心。',
    },
    {
        id:'wood', name:'Wood', cn:'木', py:'Mù',
        color:'#43a047', glow:'67,160,71',
        season:'Spring', seasonZh:'春', ordinal:'1st Planet', ordinalZh:'第一行星',
        r:0.185, spd:0.41, tilt:0.055, a0:2.4, sz:11,
        organs:'Liver · Gallbladder', organsZh:'肝 · 膽',
        energy:'Upward and outward', energyZh:'向上向外伸展',
        gen:'Fire', ctrl:'Earth',
        freq: 329.63,
        quote:'The courage to begin — to bend without breaking and to rise without losing one\'s roots.',
        quoteZh:'開始的勇氣——彎而不折,升而不忘根本。',
    },
    {
        id:'earth', name:'Earth', cn:'土', py:'Tǔ',
        color:'#f9a825', glow:'249,168,37',
        season:'Late Summer', seasonZh:'長夏', ordinal:'3rd Planet', ordinalZh:'第三行星',
        r:0.265, spd:0.265, tilt:0.05, a0:4.0, sz:13,
        organs:'Spleen · Stomach', organsZh:'脾 · 胃',
        energy:'Reception, drawing toward center', energyZh:'承納,向中心匯聚',
        gen:'Metal', ctrl:'Water',
        freq: 261.63,
        quote:'Stillness is not absence of motion — it is motion so perfectly balanced it appears still.',
        quoteZh:'靜並非無動——而是動達致完美平衡,看似靜止。',
    },
    {
        id:'metal', name:'Metal', cn:'金', py:'Jīn',
        color:'#90a4ae', glow:'144,164,174',
        season:'Autumn', seasonZh:'秋', ordinal:'4th Planet', ordinalZh:'第四行星',
        r:0.352, spd:0.175, tilt:0.07, a0:0.8, sz:10,
        organs:'Lungs · Large Intestine', organsZh:'肺 · 大腸',
        energy:'Inward and downward', energyZh:'向內向下收斂',
        gen:'Water', ctrl:'Wood',
        freq: 293.66,
        quote:'Clarity without coldness — precision without cruelty — the ability to let go without grief.',
        quoteZh:'清明而不冷峻——精準而不殘酷——放下而不悲傷的能力。',
    },
    {
        id:'water', name:'Water', cn:'水', py:'Shuǐ',
        color:'#1e88e5', glow:'30,136,229',
        season:'Winter', seasonZh:'冬', ordinal:'5th Planet', ordinalZh:'第五行星',
        r:0.438, spd:0.107, tilt:0.05, a0:3.2, sz:12,
        organs:'Kidneys · Bladder', organsZh:'腎 · 膀胱',
        energy:'Downward, filling every hollow', energyZh:'向下流注,充盈每個低處',
        gen:'Wood', ctrl:'Fire',
        freq: 440.00,
        quote:'Wisdom without fear — the willingness to descend into the unknown and trust the ascent will follow.',
        quoteZh:'無懼的智慧——願意潛入未知,並相信終將上升。',
    },
];

// Cycles
const GEN  = ['wood','fire','earth','metal','water'];
const CTRL = ['wood','earth','water','fire','metal'];

// ── Trigrams (Later Heaven / 後天八卦) ──
// Compass angles: S=π/2, SW=3π/4, W=π, NW=-3π/4, N=-π/2, NE=-π/4, E=0, SE=π/4
// lines: top→bottom, true = solid (yang ⚊), false = broken (yin ⚋)
const TRIGRAMS = [
    { sym:'☲', cn:'離', name:'Li',   element:'Fire',    angle: Math.PI/2,     lines:[true,false,true]  }, // S
    { sym:'☷', cn:'坤', name:'Kun',  element:'Earth',   angle: 3*Math.PI/4,   lines:[false,false,false]}, // SW
    { sym:'☱', cn:'兌', name:'Dui',  element:'Lake',    angle: Math.PI,       lines:[false,true,true]  }, // W
    { sym:'☰', cn:'乾', name:'Qian', element:'Heaven',  angle: -3*Math.PI/4,  lines:[true,true,true]   }, // NW
    { sym:'☵', cn:'坎', name:'Kan',  element:'Water',   angle: -Math.PI/2,    lines:[false,true,false] }, // N
    { sym:'☶', cn:'艮', name:'Gen',  element:'Mountain',angle: -Math.PI/4,    lines:[true,false,false] }, // NE
    { sym:'☳', cn:'震', name:'Zhen', element:'Thunder', angle: 0,             lines:[false,false,true] }, // E
    { sym:'☴', cn:'巽', name:'Xun',  element:'Wind',    angle: Math.PI/4,     lines:[true,true,false]  }, // SE
];

// ── Qi particles ──
const QI = Array.from({length:160}, () => {
    const pi = Math.floor(Math.random() * 5);
    return {
        pi,
        a: Math.random() * Math.PI * 2,
        dr: (Math.random() - 0.5) * 0.045,
        spd: 0.25 + Math.random() * 0.85,
        alpha: Math.random() * 0.55 + 0.08,
        sz: Math.random() * 1.6 + 0.4,
    };
});

// ── Audio ──
let audioCtx = null;
let hoverOsc = null, hoverGain = null;

function initAudio() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playHover(planet) {
    if (!soundOn) return;
    initAudio();
    stopHover();
    hoverOsc = audioCtx.createOscillator();
    hoverGain = audioCtx.createGain();
    hoverOsc.type = 'sine';
    hoverOsc.frequency.value = planet.freq;
    hoverGain.gain.setValueAtTime(0, audioCtx.currentTime);
    hoverGain.gain.linearRampToValueAtTime(0.035, audioCtx.currentTime + 0.12);
    hoverOsc.connect(hoverGain);
    hoverGain.connect(audioCtx.destination);
    hoverOsc.start();
}

function stopHover() {
    if (hoverOsc) {
        try {
            hoverGain.gain.cancelScheduledValues(audioCtx.currentTime);
            hoverGain.gain.setValueAtTime(hoverGain.gain.value, audioCtx.currentTime);
            hoverGain.gain.linearRampToValueAtTime(0.0001, audioCtx.currentTime + 0.18);
            hoverOsc.stop(audioCtx.currentTime + 0.18);
        } catch(e) {}
        hoverOsc = null; hoverGain = null;
    }
}

function playClick(planet) {
    if (!soundOn) return;
    initAudio();
    const freq = planet.freq;
    // Fundamental + fifth + octave, each fading out
    [[freq, 0.08], [freq * 1.5, 0.045], [freq * 2, 0.03]].forEach(([f, vol]) => {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.value = f;
        gain.gain.setValueAtTime(vol, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 2.0);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 2.0);
    });
}

// ── Helpers ──
function ppos(p) {
    const cx = W / 2, cy = H / 2;
    const R = Math.min(W, H) / 2;
    const angle = p.a0 + t * p.spd;
    return {
        x: cx + Math.cos(angle) * p.r * R,
        y: cy + Math.sin(angle) * p.r * R * (1 - p.tilt),
    };
}

function byId(id) { return PLANETS.find(p => p.id === id); }

function hexR(h) { return parseInt(h.slice(1,3),16); }
function hexG(h) { return parseInt(h.slice(3,5),16); }
function hexB(h) { return parseInt(h.slice(5,7),16); }
function lighten(h, n) {
    return `rgb(${Math.min(255,hexR(h)+n)},${Math.min(255,hexG(h)+n)},${Math.min(255,hexB(h)+n)})`;
}

// ── Now mode ──
function getActiveElementId() {
    const now = new Date();
    if (nowMode === 1) {
        // Season
        const month = now.getMonth() + 1;
        if (month >= 3 && month <= 5) return 'wood';
        if (month >= 6 && month <= 8) return 'fire';
        if (month === 9) return 'earth';
        if (month >= 10 && month <= 11) return 'metal';
        return 'water';
    } else if (nowMode === 2) {
        // TCM organ clock (2-hour periods)
        const h = now.getHours();
        if (h >= 23 || h < 3) return 'wood';   // 11pm–3am Gallbladder/Liver
        if (h >= 3 && h < 7) return 'metal';    // 3–7am Lung/Large Intestine
        if (h >= 7 && h < 11) return 'earth';   // 7–11am Stomach/Spleen
        if (h >= 11 && h < 15) return 'fire';   // 11am–3pm Heart/Small Intestine
        if (h >= 15 && h < 19) return 'water';  // 3–7pm Bladder/Kidney
        return 'fire';                            // 7–11pm Pericardium
    }
    return null;
}

function updateNowBadge() {
    const badge = document.getElementById('now-badge');
    document.getElementById('now-label').textContent = tr('activeEl');
    if (nowMode === 0) { badge.classList.remove('show'); return; }
    badge.classList.add('show');
    const id = getActiveElementId();
    const p = byId(id);
    document.getElementById('now-element').textContent = `${p.cn} ${p.name}`;
    document.getElementById('now-element').style.color = p.color;
    document.getElementById('now-mode').textContent = nowMode === 1 ? tr('season') : tr('organClock');
}

// ── Draw ──
function drawBg() {
    const g = ctx.createRadialGradient(
        W/2, H/2, 0,
        W/2, H/2, Math.max(W, H)*0.75
    );
    g.addColorStop(0, '#0e1230');
    g.addColorStop(0.45, '#090b1e');
    g.addColorStop(1, '#050812');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);
}

function drawStars() {
    STARS.forEach(s => {
        const tw = 0.55 + 0.45 * Math.sin(t * s.ts + s.to);
        ctx.beginPath();
        ctx.arc(s.x * W, s.y * H, s.r, 0, Math.PI*2);
        ctx.fillStyle = s.gold
            ? `rgba(201,162,39,${s.a * tw})`
            : `rgba(255,255,255,${s.a * tw})`;
        ctx.fill();
    });
}

function drawOrbits() {
    const cx = W/2, cy = H/2;
    const R = Math.min(W, H)/2;
    PLANETS.forEach(p => {
        const isSel = selected && selected.id === p.id;
        ctx.save();
        ctx.translate(cx, cy);
        ctx.scale(1, 1 - p.tilt);
        ctx.beginPath();
        ctx.arc(0, 0, p.r * R, 0, Math.PI*2);
        ctx.strokeStyle = isSel
            ? `rgba(${p.glow},0.55)`
            : `rgba(${p.glow},0.12)`;
        ctx.lineWidth = isSel ? 1.5 : 0.7;
        ctx.setLineDash([3, 9]);
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.restore();
    });
}

function drawCycleLines() {
    if (!showCycles) return;

    // Generating — green flowing dots
    for (let i = 0; i < GEN.length; i++) {
        const pa = ppos(byId(GEN[i]));
        const pb = ppos(byId(GEN[(i+1) % GEN.length]));

        ctx.beginPath();
        ctx.moveTo(pa.x, pa.y);
        ctx.lineTo(pb.x, pb.y);
        ctx.strokeStyle = 'rgba(100,210,120,0.10)';
        ctx.lineWidth = 1;
        ctx.setLineDash([]);
        ctx.stroke();

        // 4 dots flowing from source to generated
        const numDots = 4;
        for (let d = 0; d < numDots; d++) {
            const frac = ((t * 0.28 + d / numDots) % 1 + 1) % 1;
            const x = pa.x + (pb.x - pa.x) * frac;
            const y = pa.y + (pb.y - pa.y) * frac;
            const alpha = Math.sin(frac * Math.PI) * 0.75;
            ctx.beginPath();
            ctx.arc(x, y, 2.8, 0, Math.PI*2);
            ctx.fillStyle = `rgba(100,210,120,${alpha})`;
            ctx.fill();
        }
    }

    // Controlling — red flowing dots
    for (let i = 0; i < CTRL.length; i++) {
        const pa = ppos(byId(CTRL[i]));
        const pb = ppos(byId(CTRL[(i+1) % CTRL.length]));

        ctx.beginPath();
        ctx.moveTo(pa.x, pa.y);
        ctx.lineTo(pb.x, pb.y);
        ctx.strokeStyle = 'rgba(210,80,80,0.08)';
        ctx.lineWidth = 1;
        ctx.setLineDash([]);
        ctx.stroke();

        const numDots = 3;
        for (let d = 0; d < numDots; d++) {
            const frac = ((t * 0.18 + d / numDots) % 1 + 1) % 1;
            const x = pa.x + (pb.x - pa.x) * frac;
            const y = pa.y + (pb.y - pa.y) * frac;
            const alpha = Math.sin(frac * Math.PI) * 0.6;
            ctx.beginPath();
            ctx.arc(x, y, 2, 0, Math.PI*2);
            ctx.fillStyle = `rgba(210,80,80,${alpha})`;
            ctx.fill();
        }
    }
}

function drawQi() {
    if (!showQi) return;
    const cx = W/2, cy = H/2;
    const R = Math.min(W, H)/2;

    QI.forEach(q => {
        const p = PLANETS[q.pi];
        const angle = q.a + t * p.spd * q.spd;
        const r = (p.r + q.dr) * R;
        const x = cx + Math.cos(angle) * r;
        const y = cy + Math.sin(angle) * r * (1 - p.tilt);

        const pulse = 0.6 + 0.4 * Math.sin(t * 1.5 + q.a);
        ctx.beginPath();
        ctx.arc(x, y, q.sz, 0, Math.PI*2);
        ctx.fillStyle = `rgba(201,162,39,${q.alpha * pulse * 0.55})`;
        ctx.fill();
    });
}

function drawBagua() {
    if (!showBagua) return;
    const cx = W/2, cy = H/2;
    const R = Math.min(W, H)/2;
    const ringR = 0.56 * R;
    const rotOffset = t * 0.04; // slow drift

    // Trigram bar geometry
    const barW = R * 0.052;          // full line width
    const barH = Math.max(2, R * 0.0075); // line thickness
    const gapV = R * 0.016;          // vertical gap between the 3 lines
    const gapBroken = barW * 0.32;   // gap in a broken (yin) line

    TRIGRAMS.forEach(tg => {
        const ang = tg.angle + rotOffset;
        const x = cx + Math.cos(ang) * ringR;
        const y = cy + Math.sin(ang) * ringR;

        const pulse = 0.78 + 0.22 * Math.sin(t * 0.6 + tg.angle);
        const alpha = 0.85 * pulse;

        ctx.save();
        ctx.shadowColor = 'rgba(201,162,39,0.55)';
        ctx.shadowBlur = R * 0.012;
        ctx.fillStyle = `rgba(224,188,84,${alpha})`;

        // Draw 3 stacked lines (top→bottom)
        tg.lines.forEach((solid, i) => {
            const ly = y + (i - 1) * gapV - barH / 2;
            if (solid) {
                ctx.fillRect(x - barW / 2, ly, barW, barH);
            } else {
                const seg = (barW - gapBroken) / 2;
                ctx.fillRect(x - barW / 2, ly, seg, barH);
                ctx.fillRect(x + gapBroken / 2, ly, seg, barH);
            }
        });
        ctx.restore();

        if (showLabels) {
            const labelR = ringR + R * 0.075;
            const lx = cx + Math.cos(ang) * labelR;
            const lyc = cy + Math.sin(ang) * labelR;
            ctx.save();
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            // Chinese name
            ctx.font = `${Math.round(R * 0.03)}px Georgia`;
            ctx.fillStyle = `rgba(232,200,120,${0.8 * pulse})`;
            ctx.fillText(tg.cn, lx, lyc - R * 0.012);
            // English element
            ctx.font = `${Math.round(R * 0.019)}px Georgia`;
            ctx.fillStyle = `rgba(232,200,120,${0.5 * pulse})`;
            ctx.fillText(tg.element, lx, lyc + R * 0.018);
            ctx.restore();
        }
    });

    // Subtle ring guide
    ctx.save();
    ctx.beginPath();
    ctx.arc(cx, cy, ringR, 0, Math.PI*2);
    ctx.strokeStyle = 'rgba(201,162,39,0.10)';
    ctx.lineWidth = 0.8;
    ctx.setLineDash([2, 18]);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();
}

function drawSun() {
    const cx = W/2, cy = H/2;
    const r = Math.min(W, H) * 0.037;

    const aura = ctx.createRadialGradient(cx, cy, r*0.6, cx, cy, r*4.5);
    aura.addColorStop(0, 'rgba(255,224,100,0.22)');
    aura.addColorStop(0.35, 'rgba(201,162,39,0.09)');
    aura.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = aura;
    ctx.beginPath();
    ctx.arc(cx, cy, r*4.5, 0, Math.PI*2);
    ctx.fill();

    const ring = ctx.createRadialGradient(cx, cy, r*0.8, cx, cy, r*2);
    ring.addColorStop(0, 'rgba(255,235,150,0.12)');
    ring.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = ring;
    ctx.beginPath();
    ctx.arc(cx, cy, r*2, 0, Math.PI*2);
    ctx.fill();

    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(t * 0.28);

    ctx.beginPath();
    ctx.arc(0, 0, r, -Math.PI/2, Math.PI/2, false);
    ctx.fillStyle = '#f0e0a0';
    ctx.fill();

    ctx.beginPath();
    ctx.arc(0, 0, r, Math.PI/2, -Math.PI/2, false);
    ctx.fillStyle = '#0c102e';
    ctx.fill();

    ctx.beginPath();
    ctx.arc(0, -r/2, r/2, -Math.PI/2, Math.PI/2, true);
    ctx.fillStyle = '#0c102e';
    ctx.fill();

    ctx.beginPath();
    ctx.arc(0, r/2, r/2, -Math.PI/2, Math.PI/2, false);
    ctx.fillStyle = '#f0e0a0';
    ctx.fill();

    ctx.beginPath();
    ctx.arc(0, -r/2, r/5.5, 0, Math.PI*2);
    ctx.fillStyle = '#f0e0a0';
    ctx.fill();

    ctx.beginPath();
    ctx.arc(0, r/2, r/5.5, 0, Math.PI*2);
    ctx.fillStyle = '#0c102e';
    ctx.fill();

    ctx.beginPath();
    ctx.arc(0, 0, r, 0, Math.PI*2);
    ctx.strokeStyle = 'rgba(201,162,39,0.65)';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    ctx.restore();

    if (showLabels) {
        ctx.fillStyle = 'rgba(201,162,39,0.32)';
        ctx.font = `${Math.round(r*0.55)}px Georgia`;
        ctx.textAlign = 'center';
        ctx.fillText('陰陽', cx, cy + r + 18);
    }
}

function drawPlanets() {
    const activeId = nowMode > 0 ? getActiveElementId() : null;

    PLANETS.forEach(p => {
        const pos = ppos(p);
        const isSel = selected && selected.id === p.id;
        const isHov = hovered && hovered.id === p.id;
        const isActive = activeId === p.id;
        const sz = p.sz * (isSel ? 1.38 : isHov ? 1.15 : 1);

        ctx.save();

        // Extra glow for active element in now mode
        if (isActive) {
            const pulse = 0.7 + 0.3 * Math.sin(t * 2.2);
            ctx.shadowColor = p.color;
            ctx.shadowBlur = 48 * pulse;
            ctx.beginPath();
            ctx.arc(pos.x, pos.y, sz + 10, 0, Math.PI*2);
            ctx.strokeStyle = `rgba(${p.glow},${0.35 * pulse})`;
            ctx.lineWidth = 2;
            ctx.stroke();
        }

        ctx.shadowColor = p.color;
        ctx.shadowBlur = isSel ? 32 : isHov ? 22 : 14;

        const g = ctx.createRadialGradient(
            pos.x - sz*0.32, pos.y - sz*0.32, sz*0.05,
            pos.x, pos.y, sz
        );
        g.addColorStop(0, lighten(p.color, 55));
        g.addColorStop(0.5, p.color);
        g.addColorStop(1, `rgba(${p.glow},0.7)`);

        ctx.beginPath();
        ctx.arc(pos.x, pos.y, sz, 0, Math.PI*2);
        ctx.fillStyle = g;
        ctx.fill();

        if (isSel) {
            ctx.beginPath();
            ctx.arc(pos.x, pos.y, sz + 6, 0, Math.PI*2);
            ctx.strokeStyle = `rgba(${p.glow},0.5)`;
            ctx.lineWidth = 1.5;
            ctx.stroke();
        }

        ctx.restore();

        if (showLabels) {
            ctx.save();
            ctx.font = `${isSel ? 14 : 12}px Georgia`;
            ctx.textAlign = 'center';
            ctx.fillStyle = (isSel || isActive) ? p.color : 'rgba(245,240,232,0.72)';
            ctx.fillText(p.cn, pos.x, pos.y - sz - 8);
            if (isSel || isHov || isActive) {
                ctx.font = '10px Georgia';
                ctx.fillStyle = 'rgba(245,240,232,0.45)';
                ctx.fillText(p.name, pos.x, pos.y - sz - 22);
            }
            ctx.restore();
        }
    });
}

// ── Render loop ──
let last = null;
let nowTickCounter = 0;
function render(now) {
    if (!last) last = now;
    const dt = Math.min((now - last) / 1000, 0.08);
    last = now;
    if (!paused) t += dt * speed;

    // Update now badge every ~60 frames
    nowTickCounter++;
    if (nowTickCounter % 60 === 0) updateNowBadge();

    drawBg();
    drawStars();
    drawBagua();
    drawOrbits();
    drawCycleLines();
    drawQi();
    drawSun();
    drawPlanets();

    requestAnimationFrame(render);
}
requestAnimationFrame(render);

// ── Mouse interaction ──
function findPlanetAt(mx, my) {
    const pad = COARSE ? 26 : 14;
    for (const p of PLANETS) {
        const pos = ppos(p);
        if (Math.hypot(mx - pos.x, my - pos.y) <= p.sz + pad) return p;
    }
    return null;
}

function selectPlanet(p) {
    if (p) {
        selected = p;
        playClick(p);
        openPanel(p);
    } else {
        selected = null;
        document.getElementById('info').classList.remove('show');
    }
    document.getElementById('tooltip').style.display = 'none';
}

canvas.addEventListener('mousemove', e => {
    const p = findPlanetAt(e.clientX, e.clientY);

    if (p !== prevHovered) {
        if (prevHovered && !p) stopHover();
        if (p) playHover(p);
        prevHovered = p;
    }

    hovered = p;
    canvas.style.cursor = p ? 'pointer' : 'crosshair';

    const tip = document.getElementById('tooltip');
    if (p && !selected) {
        tip.textContent = `${p.cn} ${p.name} — ${p.season}`;
        tip.style.color = p.color;
        tip.style.borderColor = `rgba(${p.glow},0.45)`;
        tip.style.display = 'block';
        // Clamp within viewport, flipping when near the right/bottom edge
        const tw = tip.offsetWidth, th = tip.offsetHeight, m = 8;
        let lx = e.clientX + 16, ly = e.clientY - 12;
        if (lx + tw + m > W) lx = e.clientX - tw - 16;
        if (ly + th + m > H) ly = H - th - m;
        if (ly < m) ly = m;
        tip.style.left = lx + 'px';
        tip.style.top  = ly + 'px';
    } else {
        tip.style.display = 'none';
    }
});

canvas.addEventListener('click', e => {
    selectPlanet(findPlanetAt(e.clientX, e.clientY));
});

canvas.addEventListener('touchstart', e => {
    if (e.touches.length !== 1) return;
    const tch = e.touches[0];
    const p = findPlanetAt(tch.clientX, tch.clientY);
    if (p) {
        e.preventDefault();
        if (soundOn) initAudio();
    }
    selectPlanet(p);
}, { passive: false });

function openPanel(p) {
    document.getElementById('i-name').textContent = `${p.name} — ${p.py}`;
    document.getElementById('i-name').style.color = p.color;
    document.getElementById('i-chinese').textContent = p.cn;
    document.getElementById('i-chinese').style.color = p.color;
    document.getElementById('i-sub').textContent = `${pf(p,'ordinal')}  ·  ${pf(p,'season')}`;
    document.getElementById('iv-planet').textContent = pf(p,'ordinal');
    document.getElementById('iv-organs').textContent = pf(p,'organs');
    document.getElementById('iv-energy').textContent = pf(p,'energy');
    document.getElementById('iv-gen').textContent = elLabel(p.gen);
    document.getElementById('iv-ctrl').textContent = elLabel(p.ctrl);
    document.getElementById('i-quote').textContent = `"${pf(p,'quote')}"`;
    document.getElementById('info').style.borderColor = `rgba(${p.glow},0.38)`;
    document.getElementById('info').classList.add('show');
}

document.getElementById('info-x').addEventListener('click', () => {
    selected = null;
    document.getElementById('info').classList.remove('show');
});

// ── Controls ──
let speedSteps = [0.25, 0.5, 1, 2, 4, 8, 16];
let speedIdx = 2;

function updateSpeed() {
    speed = speedSteps[speedIdx];
    document.getElementById('speed-display').textContent = `${speed}× ${tr('speed')}`;
}

function updatePauseLabel() {
    document.getElementById('btn-pause').textContent = `${paused ? '▶' : '⏸'} ${tr(paused ? 'resume' : 'pause')}`;
}

function updateNowBtnLabel() {
    const keys = ['now', 'season', 'clock'];
    document.getElementById('btn-now').textContent = tr(keys[nowMode]);
}

function updateLangBtnLabel() {
    const labelMap = { en: 'EN', zh: '中文', both: 'EN/中' };
    document.getElementById('btn-lang').textContent = `🌐 ${labelMap[lang]}`;
}

function applyLanguage() {
    updateSpeed();
    updatePauseLabel();
    document.getElementById('btn-cycles').textContent = tr('cycles');
    document.getElementById('btn-qi').textContent = tr('qi');
    document.getElementById('btn-labels').textContent = tr('labels');
    document.getElementById('btn-bagua').textContent = tr('bagua');
    document.getElementById('btn-sound').textContent = `♪ ${tr('sound')}`;
    updateNowBtnLabel();
    updateLangBtnLabel();
    document.getElementById('leg-gen-text').textContent = tr('generating');
    document.getElementById('leg-ctrl-text').textContent = tr('controlling');
    handleEl.textContent = `☰ ${tr('menu')}`;
    handleEl.setAttribute('aria-label', tr('show'));
    const minBtn = document.getElementById('btn-min');
    minBtn.title = tr('hide');
    minBtn.setAttribute('aria-label', tr('hide'));
    updateNowBadge();

    document.getElementById('lbl-planet').textContent = tr('lblPlanet');
    document.getElementById('lbl-organs').textContent = tr('lblOrgans');
    document.getElementById('lbl-energy').textContent = tr('lblEnergy');
    document.getElementById('lbl-gen').textContent = tr('lblGenerates');
    document.getElementById('lbl-ctrl').textContent = tr('lblControls');
    if (selected) openPanel(selected); // re-render the open detail panel in the new language
}

document.getElementById('btn-fast').addEventListener('click', () => {
    speedIdx = Math.min(speedIdx + 1, speedSteps.length - 1);
    updateSpeed();
});
document.getElementById('btn-slow').addEventListener('click', () => {
    speedIdx = Math.max(speedIdx - 1, 0);
    updateSpeed();
});

document.getElementById('btn-pause').addEventListener('click', function() {
    paused = !paused;
    updatePauseLabel();
    this.classList.toggle('active', paused);
});

document.getElementById('btn-cycles').addEventListener('click', function() {
    showCycles = !showCycles;
    this.classList.toggle('active', showCycles);
});

document.getElementById('btn-qi').addEventListener('click', function() {
    showQi = !showQi;
    this.classList.toggle('active', showQi);
});

document.getElementById('btn-labels').addEventListener('click', function() {
    showLabels = !showLabels;
    this.classList.toggle('active', showLabels);
});

document.getElementById('btn-bagua').addEventListener('click', function() {
    showBagua = !showBagua;
    this.classList.toggle('active', showBagua);
});

document.getElementById('btn-sound').addEventListener('click', function() {
    soundOn = !soundOn;
    this.classList.toggle('active', soundOn);
    if (soundOn) initAudio();
    else stopHover();
});

document.getElementById('btn-now').addEventListener('click', function() {
    nowMode = (nowMode + 1) % 3;
    updateNowBtnLabel();
    this.classList.toggle('active', nowMode > 0);
    updateNowBadge();
});

document.getElementById('btn-lang').addEventListener('click', function() {
    const order = ['en', 'zh', 'both'];
    lang = order[(order.indexOf(lang) + 1) % order.length];
    try { localStorage.setItem('taiji-lang', lang); } catch (e) {}
    applyLanguage();
});

// ── Keyboard shortcuts ──
window.addEventListener('keydown', e => {
    if (e.metaKey || e.ctrlKey || e.altKey) return;
    const click = id => document.getElementById(id).click();
    switch (e.key) {
        case ' ':        e.preventDefault(); click('btn-pause');  break;
        case '+': case '=': click('btn-fast'); break;
        case '-': case '_': click('btn-slow'); break;
        case 'c': case 'C': click('btn-cycles'); break;
        case 'q': case 'Q': click('btn-qi');     break;
        case 'l': case 'L': click('btn-labels'); break;
        case 'b': case 'B': click('btn-bagua');  break;
        case 'n': case 'N': click('btn-now');    break;
        case 'g': case 'G': click('btn-lang');   break;
        case 'Escape':
            selected = null;
            document.getElementById('info').classList.remove('show');
            document.getElementById('tooltip').style.display = 'none';
            break;
    }
});

// ── Auto-hiding control bar ──
const controlsEl = document.getElementById('controls');
const handleEl = document.getElementById('controls-handle');
let hideTimer = null;

function scheduleHide(delay) {
    clearTimeout(hideTimer);
    hideTimer = setTimeout(hideControls, delay);
}
function showControls(autoHide) {
    controlsEl.classList.remove('hidden');
    handleEl.classList.remove('show');
    if (autoHide) scheduleHide(4000);
    else clearTimeout(hideTimer);
}
function hideControls() {
    clearTimeout(hideTimer);
    controlsEl.classList.add('hidden');
    handleEl.classList.add('show');
    document.getElementById('tooltip').style.display = 'none';
}

// Reveal when the pointer nears the bottom edge; let the timer hide it otherwise
window.addEventListener('mousemove', e => {
    if (e.clientY >= H - 110) showControls(true);
});
// Keep the bar up while the pointer is actually on it
controlsEl.addEventListener('mouseenter', () => showControls(false));
controlsEl.addEventListener('mouseleave', () => scheduleHide(2000));
// Any interaction with a control resets the auto-hide timer (except minimize)
controlsEl.addEventListener('click', e => {
    if (e.target.id !== 'btn-min') showControls(true);
});

// Touch: tap near the bottom edge to summon the bar
window.addEventListener('touchstart', e => {
    const tch = e.touches[0];
    if (tch && tch.clientY >= H - 120 && controlsEl.classList.contains('hidden')) {
        showControls(true);
    }
}, { passive: true });

document.getElementById('btn-min').addEventListener('click', hideControls);
handleEl.addEventListener('click', () => showControls(true));

// Apply saved/default language to all control labels, badge, and legend
applyLanguage();

// Show briefly on load, then auto-hide for an unobstructed view
showControls(true);
</script>
</body>
</html>
